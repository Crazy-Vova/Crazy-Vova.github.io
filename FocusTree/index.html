<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus Tree</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cascadia+Mono:ital,wght@0,200..700;1,200..700&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>
    <div class="app">
        <h3>Plant Your Focus</h3>
        <h1 id="display">25:00</h1>
        
        <div class="slider-container">
            <div class="slider-line">
                <div class="slider-fill-left"></div>
                <div class="slider-fill-right"></div>
                <div class="slider-handle"></div>
            </div>
        </div>
        <video 
        src="pictures/videoTree.MP4"
        id="videoTree"
        preload="auto"
        muted
        playsinline
        width="300px"
        ></video>
        <div class="controls">
            <button id="startBtn">Start</button>
            <button id="pauseBtn">Pause</button>
            <button id="resetBtn">Reset</button>
        </div>
        <h2 id="sessionMessage">🌿 Session Complete</h2>
        <h2 id="message">Session cancelled - you left the tab.</h2>
    </div>
    <script src="script.js"></script>
</body>
</html>
